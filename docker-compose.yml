services:
  postgres:
    image: postgres:17-alpine
    container_name: monitor-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monitor_cnpj
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitor_cnpj"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  localstack:
    image: localstack/localstack:4.4.0
    container_name: monitor-api-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
      EAGER_SERVICE_LOADING: "1"
    volumes:
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"sqs\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  sqs-admin:
    image: pacovk/sqs-admin:0.9.1
    container_name: monitor-api-sqs-admin
    restart: unless-stopped
    ports:
      - "3999:3999"
    environment:
      SQS_ENDPOINT_URL: http://localstack:4566
      SQS_AWS_REGION: us-east-1
    depends_on:
      localstack:
        condition: service_healthy

  monitor-api:
    build: .
    container_name: monitor-api
    restart: unless-stopped
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/monitor_cnpj
      BETTER_AUTH_URL: http://localhost:5555
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/cnpj-sync-queue
      SEED_ON_START: "1"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5555/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

  worker:
    build: .
    container_name: monitor-api-worker
    restart: unless-stopped
    command: ["pnpm", "worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/monitor_cnpj
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/cnpj-sync-queue
      SKIP_MIGRATE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      monitor-api:
        condition: service_healthy

volumes:
  postgres_data:
