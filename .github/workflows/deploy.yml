name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "prisma/**"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "docker-compose.yml"
      - "scripts/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build monitor-api image
        run: docker build -t monitor-cnpj-api:latest .

      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd ~/monitor-api
            docker compose pull monitor-api worker || true
            docker compose build monitor-api worker
            docker compose up -d monitor-api worker
            docker compose exec -T monitor-api pnpm db:deploy
